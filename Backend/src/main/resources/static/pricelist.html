<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <title>ABS Price List</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        body{
            background: linear-gradient(to bottom,#ffffff,#fff6f0);
        }

        .page{
            width:794px;
            margin:auto;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.08);
            position:relative;
        }

        /* watermark */

        .watermark{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            opacity:0.04;
            width:420px;
        }

        /* header */

        .header{
            text-align:center;
            margin-bottom:30px;
        }

        .title{
            font-size:36px;
            font-weight:bold;
            color:#ff6a00;
        }

        .subtitle{
            color:#555;
        }

        /* category */

        .category-title{
            font-size:22px;
            font-weight:bold;
            color:#ff6a00;
            margin-top:25px;
            border-bottom:2px solid #ff6a00;
        }

        /* table */

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:10px;
        }

        th{
            text-align:left;
            background:#fff1e6;
            padding:8px;
            font-size:14px;
        }

        td{
            padding:8px;
            border-bottom:1px solid #eee;
            font-size:14px;
        }

        /* footer */

        .footer{
            margin-top:40px;
            text-align:center;
            font-size:12px;
            color:#777;
            border-top:1px solid #eee;
            padding-top:10px;
        }

    </style>

</head>


<body>

<div class="page">

    <img src="/logo.png" class="watermark">

    <div class="header">

        <img src="/logo.png" class="mx-auto w-24 mb-2">

        <div class="title">
            ABS CRACKERS WORLD
        </div>

        <div class="subtitle">
            Festival Fireworks Store - 365 days
        </div>

    </div>

    <div id="priceContainer"></div>

    <div class="footer">
        ABS Crackers World<br>
        365 Days Customer Support<br>
        www.abscrackersworld.com
    </div>

</div>


<script src="common.js"></script>

<script>

    async function loadPriceList(){

        const response = await apiRequest("/admin/catalog/data?type=retail");

        if(!response.ok){
            alert("Failed to load price list");
            return;
        }

        const data = await response.json();

        const container = document.getElementById("priceContainer");

        container.innerHTML = "";

        let serial = 1;

        for(const category in data){

            let html = `
            <div class="category-title">
            ${category}
            </div>

            <table>

            <thead>
            <tr>
                <th style="width:60px">No</th>
                <th>Product Name</th>
                <th style="width:120px">MRP</th>
                <th style="width:150px">Discounted Price</th>
            </tr>
            </thead>

            <tbody>
            `;

            data[category].forEach(product => {

                html += `
                <tr>

                <td>${serial}</td>

                <td>${product.name}</td>

                <td>₹ ${product.mrp}</td>

                <td class="text-orange-600 font-semibold">
                ₹ ${product.price}
                </td>

                </tr>
                `;

                serial++;

            });

            html += "</tbody></table>";

            container.innerHTML += html;

        }

    }

    loadPriceList();

</script>

</body>

</html>
